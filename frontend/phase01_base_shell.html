<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BlockVerify — AI Model Integrity Verification</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.13.4/ethers.umd.min.js"></script>
    <style>
        /* ───────────── Reset & Variables ───────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0a0e17;
            --surface: #111827;
            --surface2: #1f2937;
            --border: #374151;
            --text: #f3f4f6;
            --text-muted: #9ca3af;
            --primary: #6366f1;
            --primary-hover: #818cf8;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* ───────────── Layout ───────────── */
        .app {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem;
        }
    </style>
</head>

<body>

    <!-- Phase 1: Base shell — CSS reset, design tokens, body & layout -->
    <div class="app">
        <p style="color: var(--text-muted); font-size: 0.9rem;">
            Phase 1 — Base shell loaded. CSS reset, design tokens, and layout container are ready.
        </p>
    </div>

</body>

</html>
